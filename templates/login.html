<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ZTNA — Secure Login</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="login-page">

<div class="login-bg">
  <div class="grid-overlay"></div>
</div>

<div class="login-center">
  <div class="login-box">

    <!-- Brand -->
    <div class="login-brand">
      <div class="shield-icon">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 4L8 11V23C8 32.4 15.3 41.1 24 44C32.7 41.1 40 32.4 40 23V11L24 4Z" stroke="#00f5d4" stroke-width="2.5" fill="rgba(0,245,212,0.06)"/>
          <path d="M17 24L21.5 28.5L31 19" stroke="#00f5d4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>ZTNA <span>SecureVault</span></h1>
      <p>Zero Trust Network Access · Company File Portal</p>
    </div>

    <!-- Form -->
    <div class="login-form">
      <div class="form-field">
        <label>Username</label>
        <input type="text" id="uname" placeholder="Enter your username" autocomplete="off"/>
      </div>
      <div class="form-field">
        <label>Password</label>
        <input type="password" id="upass" placeholder="Enter your password"/>
      </div>
      <button class="btn-login" onclick="doLogin()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        Authenticate & Enter
      </button>
      <p id="loginErr" class="err-msg" style="display:none"></p>
    </div>

    <!-- Demo credentials -->
    <div class="cred-box">
      <div class="cred-title">Demo Credentials</div>
      <div class="cred-grid">
        <div class="cred-item owner-cred" onclick="fillCreds('owner','owner123')">
          <span class="cred-badge owner-badge">OWNER</span>
          <span>owner / owner123</span>
        </div>
        <div class="cred-item" onclick="fillCreds('alice','alice123')">
          <span class="cred-badge">USER</span>
          <span>alice / alice123</span>
        </div>
        <div class="cred-item" onclick="fillCreds('bob','bob123')">
          <span class="cred-badge">USER</span>
          <span>bob / bob123</span>
        </div>
        <div class="cred-item" onclick="fillCreds('carol','carol123')">
          <span class="cred-badge">USER</span>
          <span>carol / carol123</span>
        </div>
        <div class="cred-item" onclick="fillCreds('david','david123')">
          <span class="cred-badge">USER</span>
          <span>david / david123</span>
        </div>
      </div>
      <p class="cred-hint">💡 Click any credential above to auto-fill</p>
    </div>

    <!-- Zero trust principles -->
    <div class="principles">
      <span>🔒 Never Trust</span>
      <span>✅ Always Verify</span>
      <span>📊 Continuously Monitor</span>
    </div>

  </div>
</div>

<script>
function fillCreds(u, p) {
  document.getElementById("uname").value = u;
  document.getElementById("upass").value = p;
  document.getElementById("loginErr").style.display = "none";
}

async function doLogin() {
  const u = document.getElementById("uname").value.trim();
  const p = document.getElementById("upass").value;
  const err = document.getElementById("loginErr");

  if (!u || !p) { showErr("Please enter username and password."); return; }

  const btn = document.querySelector(".btn-login");
  btn.textContent = "Verifying…";
  btn.disabled = true;

  const res  = await fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username: u, password: p }),
  });
  const data = await res.json();

  if (data.success) {
    window.location.href = data.is_owner ? "/owner" : "/dashboard";
  } else {
    showErr(data.message || "Login failed.");
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Authenticate & Enter`;
    btn.disabled = false;
  }
}

function showErr(msg) {
  const e = document.getElementById("loginErr");
  e.textContent = msg;
  e.style.display = "block";
}

document.getElementById("upass").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});
</script>
</body>
</html>
